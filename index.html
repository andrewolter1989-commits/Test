<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pano Preisrechner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero-header">
      <p class="eyebrow">Pano</p>
      <h1>Preisrechner</h1>
    </header>

    <div id="fatalError" class="notice danger"></div>

    <section class="card calculator-shell">
      <form id="calculatorForm" class="calculator-form">
        <div class="form-grid form-grid-top">
          <div class="field">
            <label for="postalCode">PLZ Empfänger</label>
            <input id="postalCode" type="text" inputmode="text" placeholder="z. B. 27777" />
          </div>

          <div class="field">
            <label for="slots">Stellplätze</label>
            <input id="slots" type="number" min="1" step="1" value="1" />
          </div>

          <div class="field">
            <label for="pallets">Paletten</label>
            <input id="pallets" type="number" min="1" step="1" value="1" />
          </div>
        </div>

        <div class="form-grid form-grid-bottom">
          <div class="field field-wide">
            <label for="bookingWindow">Zeitfenster Buchung</label>
            <input id="bookingWindow" type="text" placeholder="Freitext Eingabe" />
          </div>

          <div class="field">
            <label for="bookingDate">Termin</label>
            <input id="bookingDate" type="date" />
          </div>
        </div>

        <div class="form-grid form-grid-notes">
          <div class="field field-wide">
            <label for="freeTextNote">Freitext</label>
            <input id="freeTextNote" type="text" placeholder="z. B. H1-Palette ohne Tausch" />
          </div>
        </div>

        <div class="form-actions">
          <button class="primary" type="submit">Berechnen</button>
          <button class="secondary" type="reset">Zurücksetzen</button>
        </div>

        <section id="summaryBox" class="summary-box" style="display:none;">
          <div class="summary-left">
            <div class="summary-row"><strong>PLZ:</strong> <span id="summaryPostal">—</span></div>
            <div class="summary-row"><strong>Stellplätze:</strong> <span id="summarySlots">—</span></div>
            <div class="summary-row"><strong>Paletten:</strong> <span id="summaryPallets">—</span></div>
            <div class="summary-row"><strong>Zeitfenster Buchung:</strong> <span id="summaryBookingWindow">—</span></div>
            <div class="summary-row"><strong>Termin:</strong> <span id="summaryBookingDate">—</span></div>
            <div class="summary-row"><strong>Freitext:</strong> <span id="summaryFreeTextNote">—</span></div>
            <div class="summary-row"><strong>Dienstleister mit Ergebnis:</strong> <span id="summaryCount">—</span></div>
          </div>
          <div class="summary-right">
            <div class="summary-best-label">Günstigster Anbieter</div>
            <div class="summary-best" id="summaryBest">—</div>
          </div>
        </section>
      </form>
    </section>

    <section id="resultsSection" class="card results-shell" style="display:none;">
      <div class="results-head">
        <h2>Preise aller Dienstleister</h2>
      </div>

      <div class="table-wrap">
        <table class="price-table">
          <thead>
            <tr>
              <th>Dienstleister</th>
              <th>Zone</th>
              <th class="right">Basis (€)</th>
              <th class="right">Floater (%)</th>
              <th class="right">Floater (€)</th>
              <th class="right">Palettentausch (€)</th>
              <th class="right">Preis (€)</th>
              <th>E-Mail</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="8" class="muted">Noch keine Berechnung.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
